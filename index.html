<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivacyVault · 隐私保险箱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
/* ============ Reset & Variables ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0a0f;
  --bg-card: rgba(20, 20, 35, 0.75);
  --bg-card-solid: #141423;
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-primary: #e8e8f0;
  --text-secondary: #9090b0;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.4);
  --accent-2: #00cec9;
  --accent-2-glow: rgba(0, 206, 201, 0.3);
  --danger: #e17055;
  --success: #00b894;
  --warning: #fdcb6e;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%; width: 100%;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ============ Animated Background ============ */
.bg-orb {
  position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.12;
  pointer-events: none; z-index: 0;
}
.bg-orb-1 { width: 500px; height: 500px; background: var(--accent);
  top: -150px; left: -100px; animation: orb-float 20s ease-in-out infinite; }
.bg-orb-2 { width: 400px; height: 400px; background: var(--accent-2);
  bottom: -120px; right: -80px; animation: orb-float 25s ease-in-out infinite reverse; }
.bg-orb-3 { width: 300px; height: 300px; background: #a29bfe;
  top: 50%; left: 50%; animation: orb-float 18s ease-in-out infinite 5s; }

@keyframes orb-float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(60px, -40px) scale(1.1); }
  50% { transform: translate(-30px, 30px) scale(0.95); }
  75% { transform: translate(-50px, -20px) scale(1.05); }
}

/* ============ Glass Panel ============ */
.glass {
  background: var(--bg-card);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
}

/* ============ App Container ============ */
#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}

/* ============ Login Screen ============ */
.login-container {
  width: 420px; padding: 48px 40px; text-align: center;
  animation: fade-slide-up 0.8s ease-out;
}

@keyframes fade-slide-up {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.lock-icon {
  width: 80px; height: 80px; margin: 0 auto 28px;
  position: relative;
}
.lock-body {
  width: 56px; height: 44px; background: var(--accent);
  border-radius: 10px; position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 30px var(--accent-glow);
}
.lock-shackle {
  width: 40px; height: 40px; border: 5px solid var(--accent);
  border-radius: 50% 50% 0 0; border-bottom: none;
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
}
.lock-keyhole {
  width: 12px; height: 12px; background: var(--bg-deep);
  border-radius: 50%; position: absolute; bottom: 14px; left: 50%;
  transform: translateX(-50%);
}
.lock-keyhole::after {
  content: ''; position: absolute; bottom: -5px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 10px; background: var(--bg-deep); border-radius: 2px;
}

.login-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
.login-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }

.input-group { position: relative; margin-bottom: 20px; }
.input-group input {
  width: 100%; padding: 14px 18px; font-size: 15px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm); color: var(--text-primary);
  outline: none; transition: var(--transition);
}
.input-group input:focus {
  border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow);
}
.input-group .input-icon {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-size: 18px; color: var(--text-secondary); pointer-events: none;
}

.strength-bar {
  height: 3px; background: rgba(255,255,255,0.08); border-radius: 4px;
  margin-top: -10px; margin-bottom: 20px; overflow: hidden;
}
.strength-fill {
  height: 100%; border-radius: 4px; transition: width 0.4s, background 0.4s;
  width: 0;
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 32px; font-size: 15px; font-weight: 600; border: none;
  border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
  letter-spacing: 0.3px;
}
.btn-primary {
  width: 100%; background: var(--accent); color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-primary); border: 1px solid var(--glass-border); }
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-small { padding: 8px 16px; font-size: 13px; }

/* ============ Dashboard ============ */
.dashboard {
  width: 100%; height: 100%; display: none; flex-direction: column;
  animation: fade-slide-up 0.5s ease-out;
}
.dashboard.active { display: flex; }

/* Header */
.dash-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px; border-bottom: 1px solid var(--glass-border);
  background: rgba(10,10,15,0.6); backdrop-filter: blur(20px);
}
.dash-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700;
}
.dash-logo .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
  box-shadow: 0 0 12px var(--accent-glow); }
.dash-actions { display: flex; gap: 12px; align-items: center; }
.encrypted-badge {
  font-size: 11px; padding: 5px 12px; border-radius: 20px;
  background: rgba(0,184,148,0.15); color: var(--success);
  border: 1px solid rgba(0,184,148,0.25);
  display: flex; align-items: center; gap: 5px;
}

/* Tabs */
.dash-tabs {
  display: flex; gap: 4px; padding: 12px 28px;
  background: rgba(10,10,15,0.4);
}
.tab-btn {
  padding: 10px 24px; border: none; background: transparent;
  color: var(--text-secondary); font-size: 14px; font-weight: 500;
  border-radius: 20px; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 7px;
}
.tab-btn.active { background: rgba(108,92,231,0.2); color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text-primary); background: rgba(255,255,255,0.04); }

/* Content */
.dash-content {
  flex: 1; padding: 28px; overflow-y: auto; overflow-x: hidden;
}
.dash-content::-webkit-scrollbar { width: 6px; }
.dash-content::-webkit-scrollbar-track { background: transparent; }
.dash-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fade-slide-up 0.4s ease-out; }

/* ============ Drop Zone ============ */
.drop-zone {
  border: 2px dashed rgba(255,255,255,0.15); border-radius: var(--radius);
  padding: 60px 40px; text-align: center; transition: var(--transition);
  cursor: pointer; position: relative;
  background: rgba(255,255,255,0.015);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent); background: rgba(108,92,231,0.06);
  box-shadow: inset 0 0 60px var(--accent-glow);
}
.drop-zone.drag-over { transform: scale(1.01); }
.drop-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
.drop-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.drop-subtitle { font-size: 13px; color: var(--text-secondary); }
.drop-zone input[type="file"] { display: none; }

/* ============ File List ============ */
.file-list { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
.file-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
  transition: var(--transition);
}
.file-item:hover { background: rgba(255,255,255,0.06); }
.file-icon { font-size: 32px; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.file-actions { display: flex; gap: 6px; flex-shrink: 0; }

.encrypted-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600;
}
.tag-encrypted { background: rgba(0,184,148,0.15); color: var(--success); }
.tag-decrypted { background: rgba(253,203,110,0.15); color: var(--warning); }

/* ============ Photo Grid ============ */
.album-toolbar {
  display: flex; gap: 12px; margin-bottom: 24px; align-items: center;
  flex-wrap: wrap;
}
.album-stats {
  margin-left: auto; font-size: 13px; color: var(--text-secondary);
}
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.photo-card {
  position: relative; aspect-ratio: 1; border-radius: var(--radius-sm);
  overflow: hidden; cursor: pointer; transition: var(--transition);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--glass-border);
  group: true;
}
.photo-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); border-color: var(--accent); }
.photo-card img {
  width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s;
}
.photo-card:hover img { transform: scale(1.08); }
.photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.3s;
  display: flex; align-items: flex-end; padding: 10px;
}
.photo-card:hover .photo-overlay { opacity: 1; }
.photo-overlay-actions {
  display: flex; gap: 6px; width: 100%; justify-content: flex-end;
}
.photo-overlay-actions button {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.2); color: #fff; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); transition: var(--transition);
}
.photo-overlay-actions button:hover { background: rgba(255,255,255,0.4); }
.photo-overlay-actions .btn-delete:hover { background: var(--danger); }

.photo-select {
  position: absolute; top: 8px; right: 8px; width: 24px; height: 24px;
  border-radius: 50%; border: 2px solid #fff; background: transparent;
  display: none; transition: var(--transition); z-index: 2;
}
.photo-card.selecting .photo-select { display: block; }
.photo-card.selected .photo-select { display: block; background: var(--accent); border-color: var(--accent); }
.photo-card.selected::after {
  content: '✓'; position: absolute; top: 9px; right: 13px;
  color: #fff; font-size: 12px; font-weight: 700; z-index: 3;
}

.empty-state {
  text-align: center; padding: 80px 20px; color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.4; }
.empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }

/* ============ Image Viewer Modal ============ */
.viewer-overlay {
  position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  backdrop-filter: blur(10px);
}
.viewer-overlay.active { opacity: 1; pointer-events: all; }
.viewer-close {
  position: absolute; top: 24px; right: 24px;
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.1); color: #fff; font-size: 22px;
  cursor: pointer; z-index: 2; transition: var(--transition);
}
.viewer-close:hover { background: rgba(255,255,255,0.25); }
.viewer-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.1); color: #fff; font-size: 22px;
  cursor: pointer; z-index: 2; transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
}
.viewer-nav:hover { background: rgba(255,255,255,0.25); }
.viewer-nav-prev { left: 24px; }
.viewer-nav-next { right: 24px; }
.viewer-image {
  max-width: 90vw; max-height: 85vh; object-fit: contain;
  border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.viewer-info {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 8px 20px; border-radius: 20px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
  font-size: 13px; color: var(--text-secondary);
}

/* ============ Toast ============ */
.toast-container {
  position: fixed; top: 24px; right: 24px; z-index: 200;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 14px 20px; border-radius: var(--radius-sm); font-size: 14px;
  min-width: 280px; max-width: 400px;
  animation: toast-in 0.4s ease-out;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.toast.removing { animation: toast-out 0.3s ease-in forwards; }
.toast-success { background: rgba(0,184,148,0.2); border: 1px solid rgba(0,184,148,0.3); color: var(--success); }
.toast-error { background: rgba(225,112,85,0.2); border: 1px solid rgba(225,112,85,0.3); color: var(--danger); }
.toast-info { background: rgba(108,92,231,0.2); border: 1px solid rgba(108,92,231,0.3); color: var(--accent); }

@keyframes toast-in {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(40px); }
}

/* ============ Progress Bar ============ */
.progress-container {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 150; width: 360px; padding: 14px 20px; border-radius: var(--radius-sm);
  background: rgba(20,20,35,0.95); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  display: none;
}
.progress-container.active { display: block; animation: fade-slide-up 0.3s ease-out; }
.progress-label { font-size: 13px; margin-bottom: 8px; display: flex; justify-content: space-between; }
.progress-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 2px; transition: width 0.3s; width: 0; }

/* ============ Settings Panel ============ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal-panel {
  width: 440px; max-height: 80vh; overflow-y: auto; padding: 32px;
  animation: modal-in 0.4s ease-out;
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
.modal-section { margin-bottom: 20px; }
.modal-section label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* ============ Responsive ============ */
@media (max-width: 640px) {
  .login-container { width: 90%; padding: 36px 24px; }
  .dash-header { padding: 12px 16px; }
  .dash-tabs { padding: 8px 16px; }
  .dash-content { padding: 16px; }
  .photo-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .drop-zone { padding: 40px 20px; }
  .toast-container { top: 12px; right: 12px; left: 12px; }
  .toast { min-width: auto; }
  .progress-container { width: calc(100% - 32px); left: 16px; transform: none; }
  .viewer-nav { width: 36px; height: 36px; font-size: 16px; }
}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div id="app"></div>
<div class="toast-container" id="toast-container"></div>
<div class="progress-container" id="progress-container">
  <div class="progress-label"><span id="progress-text">处理中...</span><span id="progress-percent">0%</span></div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<script>
// ==================== PrivacyVault Core ====================
const APP = (() => {
  'use strict';

  // --- State ---
  let encryptionKey = null;
  let currentTab = 'encrypt';
  let albumPhotos = [];
  let selectedPhotos = new Set();
  let selectionMode = false;
  let viewerIndex = -1;

  // --- DOM Cache ---
  const $app = document.getElementById('app');
  const $toasts = document.getElementById('toast-container');
  const $progress = document.getElementById('progress-container');

  // --- Helpers ---
  function $_(sel) { return document.querySelector(sel); }
  function $$_(sel) { return document.querySelectorAll(sel); }
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  // --- Toast ---
  function toast(msg, type = 'info', duration = 3000) {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    const icons = { success: '✓', error: '✕', info: 'ℹ' };
    el.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${msg}</span>`;
    $toasts.appendChild(el);
    setTimeout(() => { el.classList.add('removing'); setTimeout(() => el.remove(), 300); }, duration);
  }

  // --- Progress ---
  function showProgress(label) {
    $progress.classList.add('active');
    $_('#progress-text').textContent = label;
    $_('#progress-percent').textContent = '0%';
    $_('#progress-fill').style.width = '0%';
  }
  function updateProgress(pct) {
    $_('#progress-percent').textContent = Math.round(pct) + '%';
    $_('#progress-fill').style.width = pct + '%';
  }
  function hideProgress() {
    $progress.classList.remove('active');
  }

  // --- Encryption ---
  function deriveKey(password) {
    const salt = CryptoJS.enc.Hex.parse('1a2b3c4d5e6f70819293a4b5c6d7e8f9');
    const key = CryptoJS.PBKDF2(password, salt, {
      keySize: 256 / 32,
      iterations: 100000,
      hasher: CryptoJS.algo.SHA256
    });
    return key;
  }

  async function encryptFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
          const iv = CryptoJS.lib.WordArray.random(16);
          const encrypted = CryptoJS.AES.encrypt(wordArray, encryptionKey, {
            iv: iv,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          });
          const combined = iv.concat(encrypted.ciphertext);
          const blob = new Blob([combined], { type: 'application/octet-stream' });
          resolve({ blob, name: file.name + '.enc', originalName: file.name, size: blob.size, originalSize: file.size, type: file.type });
        } catch (err) { reject(err); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  async function decryptBlob(encryptedBlob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
          const iv = CryptoJS.lib.WordArray.create(wordArray.words.slice(0, 4));
          const ciphertext = CryptoJS.lib.WordArray.create(wordArray.words.slice(4), wordArray.sigBytes - 16);
          const cipherParams = CryptoJS.lib.CipherParams.create({ ciphertext });
          const decrypted = CryptoJS.AES.decrypt(cipherParams, encryptionKey, {
            iv: iv,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          });
          const buffer = new Uint8Array(decrypted.sigBytes);
          for (let i = 0; i < decrypted.sigBytes; i++) {
            buffer[i] = (decrypted.words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff;
          }
          resolve(buffer.buffer);
        } catch (err) { reject(new Error('解密失败，密码可能不正确')); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(encryptedBlob);
    });
  }

  async function encryptMultiple(files) {
    showProgress('正在加密文件...');
    const results = [];
    const total = files.length;
    for (let i = 0; i < files.length; i++) {
      updateProgress(((i + 1) / total) * 100);
      try {
        const result = await encryptFile(files[i]);
        results.push(result);
      } catch (e) {
        toast(`加密失败: ${files[i].name}`, 'error');
      }
    }
    hideProgress();
    if (results.length > 0) toast(`成功加密 ${results.length} 个文件`, 'success');
    return results;
  }

  // --- Storage (IndexedDB) ---
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('PrivacyVault', 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains('photos')) db.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
      };
      req.onsuccess = (e) => resolve(e.target.result);
      req.onerror = reject;
    });
  }

  async function storeEncryptedFiles(results) {
    const db = await openDB();
    const tx = db.transaction('files', 'readwrite');
    const store = tx.objectStore('files');
    for (const r of results) {
      store.add({
        name: r.name,
        originalName: r.originalName,
        size: r.size,
        originalSize: r.originalSize,
        type: r.type,
        blob: r.blob,
        createdAt: Date.now()
      });
    }
    return new Promise(resolve => { tx.oncomplete = resolve; });
  }

  async function getEncryptedFiles() {
    const db = await openDB();
    const tx = db.transaction('files', 'readonly');
    const store = tx.objectStore('files');
    return new Promise((resolve) => {
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
    });
  }

  async function deleteFile(id) {
    const db = await openDB();
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').delete(id);
    return new Promise(resolve => { tx.oncomplete = resolve; });

    const pwInput = $_('#login-password');

    pwInput.focus();

    function checkExisting() {
      const hasExisting = localStorage.getItem('pv_has_data');
      if (hasExisting === 'true') {
        confirmGroup.style.display = 'none';
        loginBtn.textContent = '解锁保险箱';
      } else {
        confirmGroup.style.display = 'block';
        loginBtn.textContent = '创建并进入';
      }
    }
    checkExisting();

    function updateStrength(pw) {
      let score = 0;
      if (pw.length >= 4) score += 25;
      if (pw.length >= 8) score += 25;
      if (/[A-Z]/.test(pw)) score += 15;
      if (/[0-9]/.test(pw)) score += 15;
      if (/[^A-Za-z0-9]/.test(pw)) score += 20;
      const colors = ['#e17055', '#e17055', '#fdcb6e', '#fdcb6e', '#00b894'];
      const idx = Math.min(Math.floor(score / 25), 4);
      strengthFill.style.width = score + '%';
      strengthFill.style.background = colors[idx];
    }

    pwInput.addEventListener('input', () => updateStrength(pwInput.value));

    async function doLogin() {
      const pw = pwInput.value.trim();
      if (!pw) { toast('请输入密码', 'error'); return; }

      const hasExisting = localStorage.getItem('pv_has_data') === 'true';
      if (!hasExisting) {
        const confirm = confirmInput.value.trim();
        if (pw !== confirm) { toast('两次密码不一致', 'error'); return; }
        if (pw.length < 4) { toast('密码至少4位', 'error'); return; }
      }

      encryptionKey = deriveKey(pw);

      if (hasExisting) {
        try {
          const photos = await getPhotos();
          if (photos.length > 0) {
            // Verify key by trying to decrypt first photo
            try {
              await decryptBlob(photos[0].blob);
            } catch (e) {
              toast('密码错误，请重试', 'error');
              encryptionKey = null;
              return;
            }
          }
        } catch (e) { /* no data yet */ }
      } else {
        localStorage.setItem('pv_has_data', 'true');
      }

      toast('欢迎回来', 'success');
      renderDashboard();
    }

    loginBtn.addEventListener('click', doLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    confirmInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  }

  async function loadPhotos() {

      if (!photo._url) {

  async function processPhotoUpload(files) {
    if (files.length === 0) return;
    showProgress('正在加密并存储照片...');
    const total = files.length;
    const results = [];
    for (let i = 0; i < files.length; i++) {
      updateProgress(((i + 1) / total) * 100);
      try {
        const result = await encryptFile(files[i]);
        results.push(result);
      } catch (e) {
        toast(`加密失败: ${files[i].name}`, 'error');
      }
    }
    if (results.length > 0) {
      await storeEncryptedPhotos(results);
      await loadPhotos();
      renderPhotoGrid();
    }
    hideProgress();
    if (results.length > 0) toast(`成功添加 ${results.length} 张照片`, 'success');
  }

  function viewerKeyboard(e) {
    if (viewerIndex < 0) return;
    if (e.key === 'ArrowLeft') viewerPrev();
    else if (e.key === 'ArrowRight') viewerNext();
    else if (e.key === 'Escape') closeViewer();
  }

  // --- Change Password ---
  function showChangePasswordModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay active';
    overlay.id = 'pw-modal-overlay';
    overlay.innerHTML = `
      <div class="modal-panel glass">
        <div class="modal-title">🔑 修改主密码</div>
        <div class="modal-section">
          <label>当前密码</label>
          <div class="input-group"><input type="password" id="pw-old" placeholder="输入当前密码"></div>
        </div>
        <div class="modal-section">
          <label>新密码</label>
          <div class="input-group"><input type="password" id="pw-new" placeholder="输入新密码（至少4位）"></div>
        </div>
        <div class="modal-section">
          <label>确认新密码</label>
          <div class="input-group"><input type="password" id="pw-new-confirm" placeholder="再次输入新密码"></div>
        </div>
        <p style="font-size:12px;color:var(--warning);margin-bottom:8px;">⚠️ 修改密码将重新加密所有文件，此操作不可撤销。</p>
        <div class="modal-actions">
          <button class="btn btn-small btn-secondary" id="btn-pw-cancel">取消</button>
          <button class="btn btn-small btn-primary" id="btn-pw-confirm">确认修改</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    $_('#btn-pw-cancel').addEventListener('click', () => overlay.remove());

    $_('#btn-pw-confirm').addEventListener('click', async () => {
      const oldPw = $_('#pw-old').value.trim();
      const newPw = $_('#pw-new').value.trim();
      const newConfirm = $_('#pw-new-confirm').value.trim();

      if (!oldPw || !newPw || !newConfirm) { toast('请填写所有字段', 'error'); return; }
      if (newPw !== newConfirm) { toast('新密码不一致', 'error'); return; }
      if (newPw.length < 4) { toast('新密码至少4位', 'error'); return; }

      // Verify old password
      const oldKey = deriveKey(oldPw);
      const testKey = encryptionKey;
      if (oldKey.toString() !== testKey.toString()) {
        toast('当前密码错误', 'error');
        return;
      }

      // Re-encrypt all files with new key
      showProgress('正在重新加密所有文件...');
      try {
        const files = await getEncryptedFiles();
        const photos = await getPhotos();
        const newKey = deriveKey(newPw);

        // Re-encrypt files
        for (let i = 0; i < files.length; i++) {
          updateProgress((i / (files.length + photos.length)) * 100);
          const buffer = await decryptBlobWithKey(files[i].blob, oldKey);
          const wordArray = CryptoJS.lib.WordArray.create(buffer);
          const iv = CryptoJS.lib.WordArray.random(16);
          const encrypted = CryptoJS.AES.encrypt(wordArray, newKey, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
          files[i].blob = new Blob([iv.concat(encrypted.ciphertext)], { type: 'application/octet-stream' });
        }

        // Re-encrypt photos
        for (let i = 0; i < photos.length; i++) {
          updateProgress(((files.length + i + 1) / (files.length + photos.length)) * 100);
          const buffer = await decryptBlobWithKey(photos[i].blob, oldKey);
          const wordArray = CryptoJS.lib.WordArray.create(buffer);
          const iv = CryptoJS.lib.WordArray.random(16);
          const encrypted = CryptoJS.AES.encrypt(wordArray, newKey, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
          photos[i].blob = new Blob([iv.concat(encrypted.ciphertext)], { type: 'application/octet-stream' });
          if (photos[i]._url) URL.revokeObjectURL(photos[i]._url);
        }

        // Save back
        const db = await openDB();
        let tx = db.transaction('files', 'readwrite');
        const fileStore = tx.objectStore('files');
        await fileStore.clear();
        for (const f of files) fileStore.add(f);
        await new Promise(r => { tx.oncomplete = r; });

        tx = db.transaction('photos', 'readwrite');
        const photoStore = tx.objectStore('photos');
        await photoStore.clear();
        for (const p of photos) photoStore.add(p);
        await new Promise(r => { tx.oncomplete = r; });

        encryptionKey = newKey;
        hideProgress();
        overlay.remove();
        toast('密码修改成功！所有文件已重新加密', 'success');
        // Reload dashboard
        if (currentTab === 'album') {
          albumPhotos = [];
          await loadPhotos();
          renderPhotoGrid();
        } else {
          await loadFileList();
        }
      } catch (e) {
        hideProgress();
        toast('修改失败: ' + e.message, 'error');
      }
    });
  }

  async function decryptBlobWithKey(blob, key) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
          const iv = CryptoJS.lib.WordArray.create(wordArray.words.slice(0, 4));
          const ciphertext = CryptoJS.lib.WordArray.create(wordArray.words.slice(4), wordArray.sigBytes - 16);
          const cipherParams = CryptoJS.lib.CipherParams.create({ ciphertext });
          const decrypted = CryptoJS.AES.decrypt(cipherParams, key, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
          const buffer = new Uint8Array(decrypted.sigBytes);
          for (let i = 0; i < decrypted.sigBytes; i++) {
            buffer[i] = (decrypted.words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff;
          }
          resolve(buffer.buffer);
        } catch (err) { reject(err); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(blob);
    });
  }

  // --- Init ---
  function init() {
    renderLogin();
  }

  return { init };
})();

APP.init();
</script>
